#name of the job
name: env-specific
on:
    workflow_dispatch:
        inputs:
            environment:
                description: default: "this is a workflow for env variable"
                default: dev
                type: choice
                required: true
                options:
                    - dev
                    - qat
                    - prod
jobs:
    code:
        runs-on: ubuntu-latest
        steps:
           - name: git checkout
             run:  echo "Code clone from Github"
    build:
        runs-on: ubuntu-latest
        needs: code
        steps:
           - name: docker build
             run: echo "docker build container"
    deploy:
        runs-on: ubuntu-latest
        needs: [code, build]
        steps:
           - name: deploy the container
             run: echo "deploying container..."
    
            
